# Netlify deployment config — Christine CAL
# Site statique pur, aucun build. Netlify sert les fichiers tels quels.

[build]
  publish = "."
  # No command — static site, nothing to build.

# ---- Preview mode (staging / review par Christine) ----
# Tant que le site est en preview, on interdit l'indexation via X-Robots-Tag.
# Pour passer en prod : retirer ce bloc headers ou remplacer "noindex" par "index".
[[headers]]
  for = "/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache aggressif sur les assets (CSS/JS/images) — ils ont un hash ou un chemin stable
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Les HTML ne sont jamais mis en cache longtemps (contenu qui évolue)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ---- 404 page ----
# Netlify utilise automatiquement /404.html pour les routes introuvables
# (déjà présent à la racine du repo).

# ---- Legacy WordPress URL redirects ----
# Quand le DNS de christinecal.com basculera, les liens WP seront redirigés.
