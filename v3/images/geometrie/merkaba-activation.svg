  <linearGradient id='mkBody' x1='0' y1='0' x2='0' y2='1'><stop offset='0%' stop-color='#15123a'/><stop offset='100%' stop-color='#080620'/></linearGradient>
  <radialGradient id='mkHeart' cx='50%' cy='50%' r='50%'><stop offset='0%' stop-color='#fffaf0' stop-opacity='1'/><stop offset='35%' stop-color='#ffe9a8' stop-opacity='.85'/><stop offset='100%' stop-color='#e6c878' stop-opacity='0'/></radialGradient>
  <radialGradient id='mkCore' cx='50%' cy='50%' r='50%'><stop offset='0%' stop-color='#fff3cf' stop-opacity='.85'/><stop offset='100%' stop-color='#e6d49a' stop-opacity='0'/></radialGradient>
  <radialGradient id='mkNuc' cx='50%' cy='50%' r='50%'><stop offset='0%' stop-color='#fffaf0'/><stop offset='100%' stop-color='#e6d49a' stop-opacity='.2'/></radialGradient>
