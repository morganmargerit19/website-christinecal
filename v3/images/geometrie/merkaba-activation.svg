  <radialGradient id='mkCrownG' cx='50%' cy='50%' r='50%'><stop offset='0%' stop-color='#fff3cf' stop-opacity='.8'/><stop offset='100%' stop-color='#e6d49a' stop-opacity='0'/></radialGradient>
  <mask id='mkRayMask'><rect width='600' height='600' fill='url(#mkRayFade)'/></mask>
  <radialGradient id='ck0' cx='50%' cy='50%' r='50%'><stop offset='0%' stop-color='#e0455a' stop-opacity='1'/><stop offset='100%' stop-color='#e0455a' stop-opacity='0'/></radialGradient><radialGradient id='ck1' cx='50%' cy='50%' r='50%'><stop offset='0%' stop-color='#ee8a3c' stop-opacity='1'/><stop offset='100%' stop-color='#ee8a3c' stop-opacity='0'/></radialGradient><radialGradient id='ck2' cx='50%' cy='50%' r='50%'><stop offset='0%' stop-color='#f0cb52' stop-opacity='1'/><stop offset='100%' stop-color='#f0cb52' stop-opacity='0'/></radialGradient><radialGradient id='ck3' cx='50%' cy='50%' r='50%'><stop offset='0%' stop-color='#5ccb8c' stop-opacity='1'/><stop offset='100%' stop-color='#5ccb8c' stop-opacity='0'/></radialGradient><radialGradient id='ck4' cx='50%' cy='50%' r='50%'><stop offset='0%' stop-color='#48a6df' stop-opacity='1'/><stop offset='100%' stop-color='#48a6df' stop-opacity='0'/></radialGradient><radialGradient id='ck5' cx='50%' cy='50%' r='50%'><stop offset='0%' stop-color='#5b5fcf' stop-opacity='1'/><stop offset='100%' stop-color='#5b5fcf' stop-opacity='0'/></radialGradient><radialGradient id='ck6' cx='50%' cy='50%' r='50%'><stop offset='0%' stop-color='#a473d0' stop-opacity='1'/><stop offset='100%' stop-color='#a473d0' stop-opacity='0'/></radialGradient>
  <filter id='mkGlow' x='-50%' y='-50%' width='200%' height='200%'><feGaussianBlur stdDeviation='2.2' result='b'/><feMerge><feMergeNode in='b'/><feMergeNode in='SourceGraphic'/></feMerge></filter>
  <filter id='mkSoft' x='-90%' y='-90%' width='280%' height='280%'><feGaussianBlur stdDeviation='9'/></filter>
  <style>
    .burst{transform-origin:300px 302px;animation:spin 80s linear infinite}
    .core{transform-origin:300px 302px;animation:breathe 5s ease-in-out infinite}
    .fol{transform-origin:300px 300px;animation:breathe 9s ease-in-out infinite}
    .chk{animation:pulse 3s ease-in-out infinite}
    .heart{transform-origin:300px 302px;animation:heartbeat 4s ease-in-out infinite}
    .orb{transform-origin:300px 120px;animation:spin linear infinite}
    .crown{transform-origin:300px 150px;animation:breathe 4.5s ease-in-out infinite}
    .star{animation:twk 3.4s ease-in-out infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes breathe{0%,100%{transform:scale(.95);opacity:.45}50%{transform:scale(1.05);opacity:.85}}
    @keyframes heartbeat{0%,100%{transform:scale(.92);opacity:.8}50%{transform:scale(1.08);opacity:1}}
    @keyframes pulse{0%,100%{opacity:.45}50%{opacity:1}}
    @keyframes twk{0%,100%{opacity:.25}50%{opacity:.95}}
    @media (prefers-reduced-motion: reduce){.burst,.core,.fol,.chk,.heart,.orb,.crown,.star{animation:none}.core,.fol,.crown{opacity:.7}.chk,.heart,.star{opacity:.95}}
  </style>
