  <defs>
    <radialGradient id='stBg' cx='50%' cy='50%' r='65%'>
      <stop offset='0%' stop-color='#13102f'/>
      <stop offset='60%' stop-color='#0b0922'/>
      <stop offset='100%' stop-color='#06051a'/>
    </radialGradient>
    <radialGradient id='stStroke' cx='50%' cy='50%' r='52%'>
      <stop offset='0%' stop-color='#fdf3cf' stop-opacity='1'/>
      <stop offset='28%' stop-color='#e6d49a' stop-opacity='0.95'/>
      <stop offset='62%' stop-color='#c9a961' stop-opacity='0.7'/>
      <stop offset='100%' stop-color='#c9a961' stop-opacity='0'/>
    </radialGradient>
    <radialGradient id='stCore' cx='50%' cy='50%' r='50%'>
      <stop offset='0%' stop-color='#fff7df' stop-opacity='0.9'/>
      <stop offset='100%' stop-color='#e6d49a' stop-opacity='0'/>
    </radialGradient>
    <filter id='stGlow' x='-30%' y='-30%' width='160%' height='160%'>
      <feGaussianBlur stdDeviation='3.2' result='b'/>
      <feMerge><feMergeNode in='b'/><feMergeNode in='SourceGraphic'/></feMerge>
    </filter>
    <style>
      .st-spin{transform-origin:300px 300px;animation:stSpin 26s linear infinite}
      .st-core{transform-origin:300px 300px;animation:stPulse 6s ease-in-out infinite}
      .spark{transform-origin:center;animation:stTwinkle 3.4s ease-in-out infinite}
      @keyframes stSpin{to{transform:rotate(-360deg)}}
      @keyframes stPulse{0%,100%{opacity:.55;transform:scale(.92)}50%{opacity:1;transform:scale(1.06)}}
      @keyframes stTwinkle{0%,100%{opacity:.25}50%{opacity:1}}
      @media (prefers-reduced-motion: reduce){
        .st-spin,.st-core,.spark{animation:none}
        .st-core{opacity:.85}
      }
    </style>
  </defs>
