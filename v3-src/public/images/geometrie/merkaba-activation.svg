<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 600 600' role='img' aria-label='Etre humain en meditation activant les geometries sacrees et ses chakras'>
<defs>
  <radialGradient id='mkBg' cx='50%' cy='44%' r='66%'><stop offset='0%' stop-color='#181442'/><stop offset='60%' stop-color='#0b0922'/><stop offset='100%' stop-color='#05041a'/></radialGradient>
  <linearGradient id='mkBody' x1='0' y1='0' x2='0' y2='1'><stop offset='0%' stop-color='#fff6dc'/><stop offset='45%' stop-color='#eecf8f'/><stop offset='100%' stop-color='#bb9a4f'/></linearGradient>
  <radialGradient id='mkAura' cx='50%' cy='50%' r='50%'><stop offset='0%' stop-color='#ffe9a8' stop-opacity='.5'/><stop offset='60%' stop-color='#e6d49a' stop-opacity='.18'/><stop offset='100%' stop-color='#e6d49a' stop-opacity='0'/></radialGradient>
  <linearGradient id='mkTri1' x1='0' y1='0' x2='0' y2='1'><stop offset='0%' stop-color='#f3e2ad' stop-opacity='.16'/><stop offset='100%' stop-color='#c9a961' stop-opacity='.02'/></linearGradient>
  <linearGradient id='mkTri2' x1='0' y1='1' x2='0' y2='0'><stop offset='0%' stop-color='#e6d49a' stop-opacity='.14'/><stop offset='100%' stop-color='#c9a961' stop-opacity='.02'/></linearGradient>
  <radialGradient id='mkCrown' cx='50%' cy='50%' r='50%'><stop offset='0%' stop-color='#fff3cf' stop-opacity='.9'/><stop offset='100%' stop-color='#e6d49a' stop-opacity='0'/></radialGradient>
  <radialGradient id='mkRayFade' cx='50%' cy='50%' r='50%'><stop offset='0%' stop-color='#fff' stop-opacity='0'/><stop offset='55%' stop-color='#fff' stop-opacity='.7'/><stop offset='100%' stop-color='#fff' stop-opacity='0'/></radialGradient>
  <mask id='mkRayMask'><rect width='600' height='600' fill='url(#mkRayFade)'/></mask>
  <radialGradient id='ck0' cx='50%' cy='50%' r='50%'><stop offset='0%' stop-color='#d6455a' stop-opacity='.95'/><stop offset='100%' stop-color='#d6455a' stop-opacity='0'/></radialGradient><radialGradient id='ck1' cx='50%' cy='50%' r='50%'><stop offset='0%' stop-color='#e58539' stop-opacity='.95'/><stop offset='100%' stop-color='#e58539' stop-opacity='0'/></radialGradient><radialGradient id='ck2' cx='50%' cy='50%' r='50%'><stop offset='0%' stop-color='#eccb55' stop-opacity='.95'/><stop offset='100%' stop-color='#eccb55' stop-opacity='0'/></radialGradient><radialGradient id='ck3' cx='50%' cy='50%' r='50%'><stop offset='0%' stop-color='#57c489' stop-opacity='.95'/><stop offset='100%' stop-color='#57c489' stop-opacity='0'/></radialGradient><radialGradient id='ck4' cx='50%' cy='50%' r='50%'><stop offset='0%' stop-color='#46a2d6' stop-opacity='.95'/><stop offset='100%' stop-color='#46a2d6' stop-opacity='0'/></radialGradient><radialGradient id='ck5' cx='50%' cy='50%' r='50%'><stop offset='0%' stop-color='#5a5ec8' stop-opacity='.95'/><stop offset='100%' stop-color='#5a5ec8' stop-opacity='0'/></radialGradient><radialGradient id='ck6' cx='50%' cy='50%' r='50%'><stop offset='0%' stop-color='#9f72cb' stop-opacity='.95'/><stop offset='100%' stop-color='#9f72cb' stop-opacity='0'/></radialGradient>
  <filter id='mkGlow' x='-40%' y='-40%' width='180%' height='180%'><feGaussianBlur stdDeviation='2.4' result='b'/><feMerge><feMergeNode in='b'/><feMergeNode in='SourceGraphic'/></feMerge></filter>
  <filter id='mkSoft' x='-80%' y='-80%' width='260%' height='260%'><feGaussianBlur stdDeviation='7'/></filter>
  <style>
    .rot{transform-origin:300px 300px;animation:spin 34s linear infinite}
    .rotR{transform-origin:300px 300px;animation:spin 42s linear infinite reverse}
    .rays{transform-origin:300px 300px;animation:spin 90s linear infinite}
    .ring{transform-origin:300px 300px;animation:breathe 5.5s ease-in-out infinite}
    .aura{transform-origin:300px 300px;animation:breathe 5s ease-in-out infinite}
    .chk{transform-origin:center;animation:pulse 2.8s ease-in-out infinite}
    .spark{transform-origin:center;animation:twk 3s ease-in-out infinite}
    .crown{transform-origin:300px 150px;animation:breathe 4.2s ease-in-out infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes breathe{0%,100%{transform:scale(.94);opacity:.5}50%{transform:scale(1.05);opacity:.95}}
    @keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
    @keyframes twk{0%,100%{opacity:.2}50%{opacity:1}}
    @media (prefers-reduced-motion: reduce){.rot,.rotR,.rays,.ring,.aura,.chk,.spark,.crown{animation:none}.ring,.aura,.crown{opacity:.8}.chk,.spark{opacity:.95}}
  </style>
</defs>
<rect width='600' height='600' fill='url(#mkBg)'/>
