<circle class='ring' cx='300' cy='182' r='38' fill='none' stroke='#e6d49a' stroke-width='1' stroke-opacity='.32'/>
<g filter='url(#mkGlow)'>
  <path d='M300,206 C322,206 340,214 348,238 C344,262 322,284 316,304 C330,334 362,354 378,376 C356,397 330,403 300,403 C270,403 244,397 222,376 C238,354 270,334 284,304 C278,284 256,262 252,238 C260,214 278,206 300,206 Z' fill='url(#mkBody)'/>
  <circle cx='300' cy='184' r='24.5' fill='url(#mkBody)'/>
  <path d='M268,360 Q300,374 332,360' fill='none' stroke='#9c7f3f' stroke-width='3' stroke-opacity='.45' stroke-linecap='round'/>
</g>
<circle class='crown' cx='300' cy='150' r='26' fill='url(#mkCrown)'/>
<g filter='url(#mkGlow)'><g class='chk' style='animation-delay:0.00s'><circle cx='300' cy='392' r='12' fill='url(#ck0)'/><circle cx='300' cy='392' r='3.7' fill='#d6455a'/><circle cx='300' cy='392' r='1.5' fill='#fff8e6'/></g><g class='chk' style='animation-delay:0.32s'><circle cx='300' cy='364' r='12' fill='url(#ck1)'/><circle cx='300' cy='364' r='3.7' fill='#e58539'/><circle cx='300' cy='364' r='1.5' fill='#fff8e6'/></g><g class='chk' style='animation-delay:0.64s'><circle cx='300' cy='334' r='12' fill='url(#ck2)'/><circle cx='300' cy='334' r='3.7' fill='#eccb55'/><circle cx='300' cy='334' r='1.5' fill='#fff8e6'/></g><g class='chk' style='animation-delay:0.96s'><circle cx='300' cy='300' r='12' fill='url(#ck3)'/><circle cx='300' cy='300' r='3.7' fill='#57c489'/><circle cx='300' cy='300' r='1.5' fill='#fff8e6'/></g><g class='chk' style='animation-delay:1.28s'><circle cx='300' cy='232' r='12' fill='url(#ck4)'/><circle cx='300' cy='232' r='3.7' fill='#46a2d6'/><circle cx='300' cy='232' r='1.5' fill='#fff8e6'/></g><g class='chk' style='animation-delay:1.60s'><circle cx='300' cy='188' r='12' fill='url(#ck5)'/><circle cx='300' cy='188' r='3.7' fill='#5a5ec8'/><circle cx='300' cy='188' r='1.5' fill='#fff8e6'/></g><g class='chk' style='animation-delay:1.92s'><circle cx='300' cy='160' r='12' fill='url(#ck6)'/><circle cx='300' cy='160' r='3.7' fill='#9f72cb'/><circle cx='300' cy='160' r='1.5' fill='#fff8e6'/></g></g>
