<g filter='url(#mkGlow)'>
  <circle class='ring' cx='300' cy='300' r='250' fill='none' stroke='#c9a961' stroke-opacity='.10'/>
  <circle class='ring' cx='300' cy='300' r='200' fill='none' stroke='#c9a961' stroke-opacity='.13' style='animation-delay:.7s'/>
  <circle class='ring' cx='300' cy='300' r='150' fill='none' stroke='#c9a961' stroke-opacity='.10' style='animation-delay:1.4s'/>
</g>
<g filter='url(#mkGlow)'>
  <g class='rot'><path d='M300,90 L481.9,405 L118.1,405 Z' fill='url(#mkTri1)' stroke='#e6d49a' stroke-width='1.7' stroke-opacity='.9'/><circle cx='300' cy='90' r='3.4' fill='#fff4d2'/><circle cx='481.9' cy='405' r='3.4' fill='#fff4d2'/><circle cx='118.1' cy='405' r='3.4' fill='#fff4d2'/></g>
  <g class='rotR'><path d='M300,510 L118.1,195 L481.9,195 Z' fill='url(#mkTri2)' stroke='#d8c483' stroke-width='1.7' stroke-opacity='.85'/><circle cx='300' cy='510' r='3.4' fill='#fff4d2'/><circle cx='118.1' cy='195' r='3.4' fill='#fff4d2'/><circle cx='481.9' cy='195' r='3.4' fill='#fff4d2'/></g>
</g>
