# Sveltia CMS — édition du contenu par Christine, depuis le navigateur (page /admin).
# Compatible Decap CMS. Chaque enregistrement = un commit GitHub → rebuild + déploiement.
#
# ⚠️ IMPORTANT : un CMS git-based réécrit TOUT le frontmatter à la sauvegarde.
# Tout champ du schéma (src/content.config.ts) absent ici serait EFFACÉ du fichier.
# => cette config liste donc l'intégralité des champs des fiches.
#
# Collection française uniquement (ce que Christine édite). Les langues EN/ES/PL/IT
# s'ajouteront à l'identique plus tard (folder .../fiches/en, default lang: en, etc.).

backend:
  name: github
  repo: morganmargerit19/website-christinecal
  branch: main
  # Connexion GitHub via le relais OAuth hébergé sur VOTRE Vercel (dossier /api du dépôt).
  # base_url = le domaine Vercel qui sert /api (à ajuster si ton domaine de prod diffère).
  base_url: https://website-christinecal.vercel.app
  auth_endpoint: /api/auth

# Dépôt des images choisies par Christine.
media_folder: "v3-src/public/images/wp"
public_folder: "/images/wp"

# Confort d'édition : commit direct (pas de workflow éditorial à valider).
publish_mode: simple

collections:
  # Les « cartes cliquables » des deux pages = les fiches. On expose UNE collection
  # par page, filtrée sur le champ « hub ». Le dossier ne contient que le FR à la
  # racine ; les champs sont définis une seule fois (ancre &fiche_fields) puis
  # réutilisés par la 2e collection (*fiche_fields).
  - name: fiches_eveil_a_soi
    label: "Cartes — Éveil à Soi"
    label_singular: "Carte"
    description: "Les cartes de la page « Éveil à Soi » (consultation, sortir de sa matrice, vaisseau…) et tout leur contenu."
    folder: "v3-src/src/content/fiches"
    filter: { field: hub, value: eveil-a-soi }
    create: true
    extension: md
    format: frontmatter
    slug: "{{slug}}"
    summary: "{{title}}"
    sortable_fields: [order, title]
    fields: &fiche_fields
      - { name: lang, label: "Langue", widget: hidden, default: fr }
      - { name: title, label: "Titre", widget: string }
      - { name: kicker, label: "Sur-titre (ex. Stage, Atelier, Consultation)", widget: string }
      - { name: hub, label: "Univers", widget: select, options: ["eveil-a-soi", "eveil-au-soi"] }
      - { name: category, label: "Catégorie", widget: select, options: ["consultation", "stage", "atelier", "conference", "voyage", "parcours"] }
      - { name: order, label: "Ordre d'affichage (petit = en premier)", widget: number, value_type: int, default: 50 }
      - { name: lede, label: "Résumé court (chapeau de page)", widget: text }
      - { name: cardLede, label: "Texte de la carte (si différent du résumé)", widget: text, required: false }

      # --- Visuels ---
      - { name: image, label: "Image principale", widget: image, required: false }
      - { name: imageAlt, label: "Texte alternatif de l'image", widget: string, required: false }
      - { name: banner, label: "Bandeau large (haut de page)", widget: image, required: false }
      - { name: bannerAlt, label: "Texte alternatif du bandeau", widget: string, required: false }
      - name: slideshow
        label: "Diaporama (remplace l'image principale en tête)"
        widget: list
        required: false
        summary: "{{fields.image}}"
        field: { name: image, label: "Image", widget: image }
      - name: gallery
        label: "Galerie d'images (dans le corps de la fiche)"
        widget: list
        required: false
        summary: "{{fields.caption}}"
        fields:
          - { name: src, label: "Image", widget: image }
          - { name: caption, label: "Légende", widget: string, required: false }
          - { name: alt, label: "Texte alternatif", widget: string, required: false }
      - name: bodyImage
        label: "Image illustrative dans le texte"
        widget: object
        required: false
        collapsed: true
        fields:
          - { name: src, label: "Image", widget: image }
          - { name: alt, label: "Texte alternatif", widget: string, required: false }
          - { name: caption, label: "Légende", widget: string, required: false }

      # --- Infos pratiques ---
      - { name: dates, label: "Dates", widget: list, required: false, field: { name: date, label: "Date", widget: string } }
      - { name: duration, label: "Durée", widget: string, required: false }
      - { name: price, label: "Tarif", widget: string, required: false }
      - { name: format, label: "Format (Présentiel ou Zoom…)", widget: string, required: false }

      # --- Audio / Vidéos ---
      - { name: audio, label: "Audio (mp3)", widget: file, required: false }
      - { name: audioTitle, label: "Titre de l'audio", widget: string, required: false }
      - { name: videosHeading, label: "Titre au-dessus des vidéos", widget: string, required: false }
      - name: videos
        label: "Vidéos YouTube"
        widget: list
        required: false
        summary: "{{fields.title}}"
        fields:
          - { name: id, label: "ID YouTube", widget: string }
          - { name: title, label: "Titre", widget: string, required: false }
          - { name: meta, label: "Légende (date…)", widget: string, required: false }
          - { name: credit, label: "Crédit", widget: select, options: ["debowska"], required: false }
          - { name: cover, label: "Jaquette (DVD…)", widget: image, required: false }
          - { name: coverAlt, label: "Texte alternatif de la jaquette", widget: string, required: false }
      - name: pendingVideos
        label: "Emplacements vidéo à intégrer (placeholders)"
        widget: list
        required: false
        fields:
          - { name: title, label: "Titre", widget: string, required: false }
          - { name: meta, label: "Légende", widget: string, required: false }

      # --- Témoignages ---
      - name: testimonials
        label: "Témoignages"
        widget: list
        required: false
        summary: "{{fields.author}}"
        fields:
          - { name: quote, label: "Témoignage", widget: text }
          - { name: author, label: "Auteur", widget: string, required: false }

      # --- Rubrique (regroupe des stages) ---
      - name: stages
        label: "Rubrique : slugs des stages regroupés"
        widget: list
        required: false
        field: { name: slug, label: "Slug du stage", widget: string }

      # --- Réglages de mise en page (avancé) ---
      - { name: hideHeaderImage, label: "Masquer l'image en tête", widget: boolean, default: false, required: false }
      - { name: hideHeaderMeta, label: "Masquer le cadre dates/format en haut", widget: boolean, default: false, required: false }
      - { name: practicalFooter, label: "Afficher les infos pratiques en bas", widget: boolean, default: false, required: false }
      - { name: richLayout, label: "Gabarit spécial", widget: select, options: ["sortir-matrice"], required: false }
      - { name: featured, label: "Mise en avant", widget: boolean, default: false, required: false }
      - { name: draft, label: "Brouillon (caché du site)", widget: boolean, default: false, required: false }

      # --- Contenu rédactionnel ---
      - { name: body, label: "Contenu", widget: markdown }

  - name: fiches_eveil_au_soi
    label: "Cartes — Éveil au Soi"
    label_singular: "Carte"
    description: "Les cartes de la page « Éveil au Soi » (mémoire galactique, Mont Shasta, Bugarach, team galactique…) et tout leur contenu."
    folder: "v3-src/src/content/fiches"
    filter: { field: hub, value: eveil-au-soi }
    create: true
    extension: md
    format: frontmatter
    slug: "{{slug}}"
    summary: "{{title}}"
    sortable_fields: [order, title]
    fields: *fiche_fields

  # =========================================================================
  # PAGES « hors fiches » (Qui suis-je, Mission, Éveil à/au Soi) — formulaire.
  # Chaque page = un fichier de données FR lu par le site (src/data/*.fr.json).
  # ⚠️ Mêmes règles que les fiches : tout champ doit figurer ici, sinon il serait
  # effacé à la sauvegarde. Seul le FR est édité au CMS (les autres langues sont
  # resynchronisées ensuite par Morgan).
  # =========================================================================
  - name: pages_fr
    label: "Pages — Français"
    description: "Les pages Qui suis-je et Mission (version française)."
    files:
      # ------------------------------ QUI SUIS-JE ------------------------------
      - name: about
        label: "Page : Qui suis-je"
        file: "v3-src/src/data/about.fr.json"
        description: "La page de présentation de Christine."
        fields:
          - name: meta
            label: "Référencement Google (titre & description)"
            widget: object
            collapsed: true
            fields:
              - { name: title, label: "Titre de l'onglet", widget: string }
              - { name: description, label: "Description (résultat Google)", widget: text }
          - name: hero
            label: "En-tête de page"
            widget: object
            fields:
              - { name: eyebrow, label: "Sur-titre", widget: string }
              - { name: title, label: "Grand titre", widget: text }
              - { name: lede, label: "Accroche (facultatif)", widget: text, required: false }
          - { name: epigraph, label: "Épigraphe (texte d'ouverture en italique)", widget: text }
          - name: galactic
            label: "Bloc « Une galactique venue d'un futur » (sur la photo)"
            widget: object
            fields:
              - { name: heading, label: "Titre", widget: string }
              - name: items
                label: "Paragraphes"
                widget: list
                field: { name: item, label: "Paragraphe", widget: text }
          - name: videos
            label: "Vidéos de présentation"
            widget: object
            fields:
              - { name: heading, label: "Titre de section", widget: string }
              - name: list
                label: "Vidéos"
                widget: list
                summary: "{{fields.title}}"
                fields:
                  - { name: id, label: "ID YouTube (les caractères après v=)", widget: string }
                  - { name: title, label: "Titre", widget: string }
                  - { name: meta, label: "Légende (date, durée…)", widget: string, required: false }
          - name: journey
            label: "Un parcours en bref"
            widget: object
            fields:
              - { name: heading, label: "Titre de section", widget: string }
              - name: items
                label: "Étapes du parcours"
                widget: list
                summary: "{{fields.lead}}"
                fields:
                  - { name: lead, label: "Intitulé (en gras)", widget: string }
                  - { name: text, label: "Texte", widget: text, hint: "Les balises <strong>…</strong>, <em>…</em> et <br /> servent à la mise en forme : à conserver." }
          - name: activities
            label: "Activités actuelles"
            widget: object
            fields:
              - { name: heading, label: "Titre de section", widget: string }
              - name: items
                label: "Activités"
                widget: list
                summary: "{{fields.title}}"
                fields:
                  - { name: title, label: "Titre de l'activité", widget: string }
                  - { name: text, label: "Texte", widget: text }
                  - name: accordion
                    label: "Liste dépliante (facultatif — ex. exemples de conférences)"
                    widget: object
                    required: false
                    collapsed: true
                    fields:
                      - { name: summary, label: "Intitulé cliquable", widget: string }
                      - name: items
                        label: "Éléments de la liste"
                        widget: list
                        field: { name: item, label: "Élément", widget: string }
          - name: specifics
            label: "Spécificités"
            widget: object
            required: false
            fields:
              - { name: heading, label: "Titre de section", widget: string }
              - name: items
                label: "Éléments"
                widget: list
                field: { name: item, label: "Élément", widget: text, hint: "La balise <strong>…</strong> met un terme en doré : à conserver." }
          - name: news
            label: "Actualités"
            widget: object
            fields:
              - { name: heading, label: "Titre de section", widget: string }
              - name: items
                label: "Éléments"
                widget: list
                field: { name: item, label: "Élément", widget: text }
          - name: upcoming
            label: "À venir"
            widget: object
            required: false
            fields:
              - { name: heading, label: "Titre de section", widget: string }
              - name: items
                label: "Éléments"
                widget: list
                field: { name: item, label: "Élément", widget: text }
          - name: clients
            label: "Une clientèle variée"
            widget: object
            fields:
              - { name: heading, label: "Titre", widget: string }
              - { name: text, label: "Texte", widget: text }

      # ------------------------------- MISSION --------------------------------
      - name: mission
        label: "Page : Mission"
        file: "v3-src/src/data/mission.fr.json"
        description: "La page « Ma mission »."
        fields:
          - { name: metaTitle, label: "Titre de l'onglet (Google)", widget: string }
          - { name: metaDesc, label: "Description Google", widget: text }
          - { name: eyebrow, label: "Sur-titre", widget: string }
          - { name: h1, label: "Grand titre", widget: string }
          - { name: lede, label: "Accroche", widget: text }
          - { name: bannerAlt, label: "Description de la bannière (accessibilité)", widget: string }
          - { name: s1Heading, label: "Titre — section « Espace-Temps »", widget: text, hint: "La balise <br /> insère un saut de ligne : à conserver." }
          - { name: s1p1, label: "Paragraphe 1 — Espace-Temps", widget: text }
          - { name: s1p2, label: "Paragraphe 2 (sous le dessin)", widget: text }
          - { name: s2Heading, label: "Titre — « La mission »", widget: string }
          - { name: s2Quote, label: "Citation principale de la mission", widget: text, hint: "Les balises <strong><em>…</em></strong> mettent le passage en évidence : à conserver." }
          - { name: s2Matrix, label: "Phrase « Matrix » (facultatif)", widget: string, required: false }
          - name: points
            label: "Les points de la mission"
            widget: list
            field: { name: point, label: "Point", widget: text }
          - { name: pioneerAlt, label: "Description de l'image « ascension » (accessibilité)", widget: string }
          - { name: pioneerHeading, label: "Titre — « Véritable pionnier »", widget: string }
          - { name: pioneerIntro, label: "Introduction — pionnier", widget: text }
          - name: pioneerQuotes
            label: "Citations — pionnier"
            widget: list
            field: { name: quote, label: "Citation", widget: text }
          - { name: pioneerP2, label: "Phrase après les citations", widget: text }
          - { name: pioneerAdn, label: "Phrase « nouvel ADN » (facultatif)", widget: text, required: false }
          - { name: pioneerP3, label: "Paragraphe de conclusion (sous la lemniscate)", widget: text }
          - { name: callEyebrow, label: "Sur-titre — « Vous sentez l'appel ? »", widget: string }
          - { name: callHeading, label: "Titre — Appel", widget: string }
          - { name: callHeadingEm, label: "Fin du titre (en doré, ex. Let's go !)", widget: string }
          - { name: callLede, label: "Accroche — Appel", widget: string }
          - { name: infinityAlt, label: "Description de la lemniscate (accessibilité)", widget: string }
          - name: crewOld
            label: "Équipage — « Vieilles Âmes »"
            widget: object
            fields:
              - { name: title, label: "Titre", widget: string }
              - { name: en, label: "Sous-titre (anglais)", widget: string }
              - { name: desc, label: "Description", widget: text }
          - name: crewYoung
            label: "Équipage — « Jeunes Âmes »"
            widget: object
            fields:
              - { name: title, label: "Titre", widget: string }
              - { name: en, label: "Sous-titre (anglais)", widget: string }
              - { name: desc, label: "Description", widget: text }
          - { name: pressHeading, label: "Titre au-dessus des vidéos (facultatif)", widget: string, required: false }
          - name: videos
            label: "Vidéos"
            widget: list
            summary: "{{fields.title}}"
            fields:
              - { name: id, label: "ID YouTube (les caractères après v=)", widget: string }
              - { name: title, label: "Titre", widget: string }
              - { name: meta, label: "Légende (date…)", widget: string, required: false }
          - { name: recognizeHeading, label: "Titre — bandeau de contact", widget: string }
          - { name: recognizeBody, label: "Texte — bandeau de contact", widget: text }
          - { name: contactCta, label: "Texte du bouton contact", widget: string }
          - { name: back, label: "Texte du lien retour", widget: string }

      # ---------------------------- ÉVEIL À SOI -------------------------------
      - name: eveilASoi
        label: "Page : Éveil à Soi"
        file: "v3-src/src/data/eveil-a-soi.fr.json"
        description: "La page d'accueil « Éveil à Soi » (le texte, hors cartes)."
        fields:
          - { name: metaTitle, label: "Titre de l'onglet (Google)", widget: string }
          - { name: metaDesc, label: "Description Google", widget: text }
          - { name: eyebrow, label: "Sur-titre", widget: string }
          - { name: h1, label: "Grand titre", widget: string }
          - { name: lede, label: "Accroche", widget: text }
          - name: intro
            label: "Paragraphes d'introduction (sous la bannière)"
            widget: list
            hint: "L'ordre compte : le 1er paragraphe est mis en avant (doré), le dernier est centré en gras. Les balises <em>…</em> (italique) et <strong>…</strong> (doré) sont à conserver."
            field: { name: paragraphe, label: "Paragraphe", widget: text }

      # ---------------------------- ÉVEIL AU SOI ------------------------------
      - name: eveilAuSoi
        label: "Page : Éveil au Soi"
        file: "v3-src/src/data/eveil-au-soi.fr.json"
        description: "La page d'accueil « Éveil au Soi » (le texte, hors cartes)."
        fields:
          - { name: metaTitle, label: "Titre de l'onglet (Google)", widget: string }
          - { name: metaDesc, label: "Description Google", widget: text }
          - { name: eyebrow, label: "Sur-titre", widget: string }
          - { name: h1, label: "Grand titre", widget: string }
          - { name: lede, label: "Accroche", widget: text }
          - name: intro
            label: "Paragraphes d'introduction (sous la bannière)"
            widget: list
            hint: "Les balises <strong>…</strong> mettent un passage en doré : à conserver."
            field: { name: paragraphe, label: "Paragraphe", widget: text }
          - name: outro
            label: "Phrases de clôture (centrées, sous les cartes)"
            widget: list
            hint: "La dernière phrase s'affiche en doré italique."
            field: { name: phrase, label: "Phrase", widget: text }
