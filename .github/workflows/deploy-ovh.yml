name: Déploiement OVH (christinecal.com)

# Construit le site V3 (cible racine) et l'envoie en FTP sur l'hébergement
# mutualisé OVH. Reste DORMANT tant que la variable de dépôt OVH_DEPLOY != 'true'
# (Settings → Secrets and variables → Actions → Variables).

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'v3-src/**'
      - '.github/workflows/deploy-ovh.yml'

concurrency:
  group: deploy-ovh
  cancel-in-progress: true

jobs:
  deploy:
    if: vars.OVH_DEPLOY == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: v3-src/package-lock.json

      - name: Installer les dépendances
        working-directory: v3-src
        run: npm ci

      - name: Build (cible OVH, racine)
        working-directory: v3-src
        env:
          DEPLOY_TARGET: ovh
          # Identifiants Tina Cloud (cf. DEPLOY-CMS-TINA.md). Absents = le site
          # se build quand même, sans la page /admin (build découplé).
          NEXT_PUBLIC_TINA_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_TINA_CLIENT_ID }}
          TINA_TOKEN: ${{ secrets.TINA_TOKEN }}
          GITHUB_BRANCH: main
        run: npm run build

      # OVH mutualisé refuse le FTPS explicite (« 500 This security scheme is not
      # implemented »). On déploie donc en SFTP (port 22, méthode OVH recommandée)
      # via lftp : `mirror -R` crée le dossier cible et `--delete` le garde propre.
      - name: Déploiement SFTP vers OVH
        env:
          SFTP_HOST: ${{ secrets.OVH_FTP_HOST }}
          SFTP_USER: ${{ secrets.OVH_FTP_USER }}
          SFTP_PASS: ${{ secrets.OVH_FTP_PASSWORD }}
          SFTP_DIR: ${{ vars.OVH_FTP_DIR }}
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y lftp
          lftp -c "set sftp:auto-confirm yes; \
            open -u \"$SFTP_USER\",\"$SFTP_PASS\" sftp://$SFTP_HOST:22; \
            mirror -R --verbose --delete --parallel=4 ./v3-src/dist/ \"$SFTP_DIR\""

      # Redirections SEO des 2 anciens domaines (coach-medium / coach-quantique) :
      # on dépose leur .htaccess dans des dossiers dédiés sur OVH. Il restera à
      # repointer ces 2 domaines dessus dans Multisite (l'ancien WP est conservé).
      - name: Déploiement SFTP des redirections (anciens domaines)
        env:
          SFTP_HOST: ${{ secrets.OVH_FTP_HOST }}
          SFTP_USER: ${{ secrets.OVH_FTP_USER }}
          SFTP_PASS: ${{ secrets.OVH_FTP_PASSWORD }}
        run: |
          mkdir -p _redir/coach-redir _redir/coach-quantique-redir
          cp redirects/coach-medium.com.htaccess    _redir/coach-redir/.htaccess
          cp redirects/coach-quantique.com.htaccess _redir/coach-quantique-redir/.htaccess
          lftp -c "set sftp:auto-confirm yes; \
            open -u \"$SFTP_USER\",\"$SFTP_PASS\" sftp://$SFTP_HOST:22; \
            mirror -R --verbose _redir/coach-redir coach-redir; \
            mirror -R --verbose _redir/coach-quantique-redir coach-quantique-redir"
